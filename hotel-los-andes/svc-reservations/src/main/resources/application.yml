spring:
  application:
    name: svc-reservations

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:reservations_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8082

# URL de comunicacion hacia svc-rooms
rooms:
  service:
    url: ${ROOMS_SERVICE_URL:http://localhost:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    com.uti.svcreservations: INFO
    io.github.resilience4j: DEBUG

# Configuracion de Resilience4j
resilience4j:
  circuitbreaker:
    instances:
      roomsService:
        register-health-indicator: true
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true

  retry:
    instances:
      roomsService:
        max-attempts: 3
        wait-duration: 2s
        retry-exceptions:
          - com.uti.svcreservations.exception.RoomServiceException
          - org.springframework.web.client.ResourceAccessException
